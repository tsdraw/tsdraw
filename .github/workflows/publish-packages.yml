name: Publish packages

on:
  push:
    branches:
      - main

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install Rollup Linux binary
        run: |
          ROLLUP_VERSION=$(node -p 'require("./node_modules/rollup/package.json").version')
          npm install --no-save "@rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION"

      - name: Build packages
        run: npm run build:core && npm run build:react

      - name: Publish changed packages
        run: npm run publish:changed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Redeploy tsdraw.com
        env:
          TSDRAW_DEPLOY: ${{ secrets.TSDRAW_DEPLOY }}
        run: |
          if [ -z "$TSDRAW_DEPLOY" ]; then
            echo "Deploy secret not configured"
            exit 0
          fi
          if ! curl -fs -X POST "$TSDRAW_DEPLOY" -o /dev/null 2>/dev/null; then
            echo "Deploy request failed"
            exit 1
          fi